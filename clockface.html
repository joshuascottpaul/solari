<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
  <title>Solari -- Clockface</title>
  <style>
    /* Picker chrome uses vw/vh for fluid OS-level sizing. Stage previews
       inside each face card are pixel-fixed, scaled by their own transform. */
    body { background: var(--bg); color: var(--type-primary); }

    #picker {
      position: fixed; inset: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-snap-stop: always;
      -webkit-overflow-scrolling: touch;
    }

    .face-section {
      height: 100vh; width: 100vw;
      position: relative;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Per-card preview stage: scaled-down 1180x820 box. */
    .preview-stage {
      position: relative;
      width: 1180px;
      height: 820px;
      transform-origin: center center;
      will-change: transform;
    }

    /* Calm preview elements mirror the main display layout, simplified.
       Drift offsets use the same CSS vars as the main display. */
    .pv-time {
      position: absolute;
      left: 50%; top: 44%;
      transform: translate(-50%, -50%) translate(var(--time-dx, 0px), var(--time-dy, 0px));
      font-size: 165px; line-height: 1;
      color: var(--type-primary);
      text-align: center;
    }
    .pv-date {
      position: absolute;
      left: 50%; top: 66%;
      transform: translate(-50%, -50%) translate(var(--date-dx, 0px), var(--date-dy, 0px));
      font-size: 47px;
      color: var(--type-secondary);
      letter-spacing: 0.04em;
      font-weight: 300;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .pv-slot {
      position: absolute;
      left: 50%; top: 84%;
      transform: translate(-50%, -50%) translate(var(--slot-dx, 0px), var(--slot-dy, 0px));
      font-size: 42px;
      color: var(--type-secondary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 300;
    }
    .pv-moon {
      position: absolute;
      left: 84%; top: 12%;
      transform: translate(-50%, -50%) translate(var(--moon-dx, 0px), var(--moon-dy, 0px));
      width: 142px; height: 142px;
    }

    /* Placeholder card content for non-Calm faces (Phase 16) */
    .placeholder {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .placeholder-name {
      font-size: 96px; font-weight: 200;
      color: rgba(240, 235, 220, 0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .placeholder-meta {
      margin-top: 24px;
      font-size: 12px;
      letter-spacing: 0.32em;
      color: rgba(240, 235, 220, 0.4);
      font-weight: 300;
      text-transform: uppercase;
    }

    /* Top bar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 2.4vh 3vw;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 1vw; letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--type-secondary);
      pointer-events: none;
      z-index: 5;
    }
    .topbar a {
      color: var(--type-secondary);
      text-decoration: none;
      pointer-events: auto;
      letter-spacing: 0.24em;
    }

    /* Right-edge dot navigation */
    .dots {
      position: fixed; right: 2vw; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 1.4vh;
      z-index: 5;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(240, 235, 220, 0.2);
      border: none; padding: 0; cursor: pointer;
      transition: background 0.4s ease;
    }
    .dot.active { background: var(--type-accent); }

    /* Bottom toolbar */
    .toolbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 2vh 3vw;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 5;
    }
    .toolbar-left { display: flex; flex-direction: column; gap: 0.4vh; }
    .toolbar-name {
      font-size: 1.4vw;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--type-primary);
      font-weight: 300;
    }
    .toolbar-blurb {
      font-size: 0.9vw;
      color: var(--type-secondary);
      letter-spacing: 0.12em;
    }
    .toolbar-right { display: flex; align-items: center; gap: 1.6vw; }
    .toolbar-index {
      font-size: 0.9vw;
      color: var(--type-secondary);
      letter-spacing: 0.32em;
    }
    .btn {
      font-family: inherit;
      font-weight: 300;
      font-size: 0.95vw;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      padding: 0.9vh 1.4vw;
      background: transparent;
      border: 1px solid rgba(240, 235, 220, 0.25);
      color: var(--type-secondary);
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    .btn:hover:not(:disabled) { border-color: var(--type-accent); color: var(--type-accent); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-apply { color: var(--type-accent); border-color: var(--type-accent); }
    .btn-apply:hover:not(:disabled) { background: rgba(244, 197, 108, 0.08); }

    /* Tweaks panel */
    .tweaks {
      position: fixed;
      right: 3vw; bottom: 9vh;
      width: 320px;
      background: rgba(20, 20, 22, 0.94);
      border: 1px solid rgba(240, 235, 220, 0.12);
      padding: 16px 20px;
      z-index: 6;
      display: none;
    }
    .tweaks.open { display: block; }
    .tweaks h3 {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 300;
      color: var(--type-secondary);
      margin-bottom: 8px;
    }
    .tweaks-row { margin-bottom: 18px; }
    .tweaks-row:last-child { margin-bottom: 0; }
    .swatches { display: flex; gap: 10px; }
    .swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .swatch.active { border-color: var(--type-primary); transform: scale(1.1); }
    .seg {
      display: flex;
      border: 1px solid rgba(240, 235, 220, 0.15);
    }
    .seg-btn {
      flex: 1;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 300;
      padding: 8px 4px;
      background: transparent;
      color: var(--type-secondary);
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .seg-btn:not(:last-child) { border-right: 1px solid rgba(240, 235, 220, 0.15); }
    .seg-btn.active { background: rgba(244, 197, 108, 0.12); color: var(--type-accent); }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 1.6vh 3vw;
      background: rgba(20, 20, 22, 0.94);
      border: 1px solid var(--type-accent);
      color: var(--type-accent);
      font-size: 1.2vw;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 10;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="picker"></div>
  <div class="topbar">
    <span>SOLARI &middot; CLOCKFACE</span>
    <a href="index.html">&larr; DISPLAY</a>
  </div>
  <div class="dots" id="dots"></div>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-name" id="toolbar-name">CALM</div>
      <div class="toolbar-blurb" id="toolbar-blurb">type weight 200, slow drift, single slot</div>
    </div>
    <div class="toolbar-right">
      <span class="toolbar-index" id="toolbar-index">01 / 05</span>
      <button class="btn" id="btn-tweaks">TWEAKS</button>
      <button class="btn btn-apply" id="btn-apply">APPLY</button>
    </div>
  </div>
  <div class="tweaks" id="tweaks">
    <div class="tweaks-row">
      <h3>Drift</h3>
      <div class="seg" id="seg-drift">
        <button class="seg-btn" data-val="off">Off</button>
        <button class="seg-btn" data-val="subtle">Subtle</button>
        <button class="seg-btn" data-val="normal">Normal</button>
        <button class="seg-btn" data-val="restless">Restless</button>
      </div>
    </div>
    <div class="tweaks-row">
      <h3>Accent</h3>
      <div class="swatches" id="swatches"></div>
    </div>
  </div>
  <div class="toast" id="toast">CALM APPLIED</div>
  <script src="lib/perlin.js"></script>
  <script src="clockface.js"></script>
</body>
</html>
